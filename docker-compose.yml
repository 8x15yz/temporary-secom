services:

  nginx:
    image: nginx:alpine
    container_name: ecs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - ecs-secom
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ecs-secom:
    build:
      context: ./temporary-secom
      dockerfile: Dockerfile
    image: bluemap/ecs-secom-temp:latest
    container_name: ecs-secom-temp
    restart: unless-stopped
    expose:
      - "8766"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  weather-secom:
    build:
      context: ./temporary-ping
      dockerfile: Dockerfile
    image: bluemap/weather-secom-temp:latest
    container_name: weather-secom-temp
    restart: unless-stopped
    ports:
      - "8767:8767"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
